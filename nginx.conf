worker_processes auto;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  server_tokens off;

  # Concise access log to stdout for `fly logs`.
  log_format short '$remote_addr $request $status $body_bytes_sent';
  access_log /dev/stdout short;

  # Gzip text-ish content. Brotli would need a non-default nginx build.
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/html
    text/css
    text/plain
    text/xml
    application/javascript
    application/json
    application/xml
    application/manifest+json
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security baseline — strict but allows the live Bug-Fab demo intake and
    # the public viewer iframe.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://bug-fab.fly.dev; font-src 'self' data:; connect-src 'self' https://bug-fab.fly.dev; frame-src https://bug-fab.fly.dev; base-uri 'self'; form-action 'self';" always;

    # Astro's hashed assets — immutable, cache for a year.
    location ~* ^/(_assets|_astro)/ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    # Pre-synced Bug-Fab bundle — immutable filename per the sync script
    # (filename is `bug-fab.js`, not hashed). Short cache + ETag is safer.
    location /bug-fab/ {
      add_header Cache-Control "public, max-age=300, must-revalidate" always;
      try_files $uri =404;
    }

    # HTML — never cache.
    location = /index.html {
      add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
      try_files $uri $uri/ $uri.html /index.html;
    }

    # Healthcheck endpoint for Fly.
    location = /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
